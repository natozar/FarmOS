name: e2e smoke

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    # Roda smoke tests contra a producao em agruai.com depois que o
    # Vercel ja deployou. Objetivo: pegar 404 nos rewrites, login quebrado
    # e regressao de bottom nav antes do usuario pegar.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Wait for Vercel deploy
        if: github.event_name == 'push'
        run: sleep 45

      - name: Run smoke tests (Chromium only on CI)
        run: npx playwright test e2e/smoke.spec.ts --project=chromium --reporter=list

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
