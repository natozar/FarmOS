<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cartão de Visita — AgrUAI</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #2a2a2a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Inter', sans-serif;
    gap: 40px;
    padding: 40px;
  }

  .label {
    color: #888;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 2px;
    font-weight: 500;
    margin-bottom: -28px;
  }

  /* === CARTÃO BASE === */
  .card {
    width: 340px;   /* 90mm em tela ~96dpi */
    height: 189px;  /* 50mm */
    border-radius: 8px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4), 0 2px 8px rgba(0,0,0,0.2);
  }

  /* === FRENTE === */
  .card-front {
    background: linear-gradient(145deg, #1A2E1A 0%, #0F1F0F 60%, #162816 100%);
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 32px 36px;
  }

  /* Textura sutil */
  .card-front::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(ellipse at 80% 20%, rgba(197,165,114,0.03) 0%, transparent 60%),
                radial-gradient(ellipse at 20% 80%, rgba(74,144,164,0.02) 0%, transparent 50%);
    pointer-events: none;
  }

  /* Linha de ouro decorativa no topo */
  .card-front::after {
    content: '';
    position: absolute;
    top: 0;
    left: 36px;
    right: 60%;
    height: 2px;
    background: linear-gradient(90deg, #C5A572, #B8945A, transparent);
  }

  .logo {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 10px;
    position: relative;
    z-index: 1;
  }

  .logo-agr {
    color: #F5F0E8;
  }

  .logo-uai {
    color: #C5A572;
  }

  .tagline {
    font-family: 'Inter', sans-serif;
    font-size: 9.5px;
    font-weight: 400;
    color: #C5A572;
    letter-spacing: 1.8px;
    text-transform: uppercase;
    position: relative;
    z-index: 1;
    line-height: 1.5;
  }

  /* Detalhe: ponto de satélite sutil */
  .sat-dot {
    position: absolute;
    top: 28px;
    right: 36px;
    width: 6px;
    height: 6px;
    background: #4A90A4;
    border-radius: 50%;
    z-index: 1;
  }
  .sat-dot::after {
    content: '';
    position: absolute;
    top: -4px; left: -4px;
    width: 14px; height: 14px;
    border: 1px solid rgba(74,144,164,0.3);
    border-radius: 50%;
  }
  .sat-dot::before {
    content: '';
    position: absolute;
    top: -9px; left: -9px;
    width: 24px; height: 24px;
    border: 1px solid rgba(74,144,164,0.12);
    border-radius: 50%;
  }

  /* Linha inferior decorativa */
  .bottom-line {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(197,165,114,0.2), transparent);
  }

  /* === VERSO === */
  .card-back {
    background: linear-gradient(145deg, #0F1F0F 0%, #1A2E1A 50%, #0F1F0F 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 36px;
    gap: 12px;
  }

  .card-back::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: radial-gradient(ellipse at 50% 50%, rgba(197,165,114,0.02) 0%, transparent 70%);
    pointer-events: none;
  }

  /* QR Code placeholder */
  .qr-container {
    width: 90px;
    height: 90px;
    border: 1.5px solid rgba(197,165,114,0.4);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    z-index: 1;
    background: rgba(245,240,232,0.95);
    padding: 4px;
  }

  /* QR code gerado via SVG */
  .qr-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .qr-placeholder svg {
    width: 72px;
    height: 72px;
  }

  .cta {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 11px;
    font-weight: 600;
    color: #C5A572;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    position: relative;
    z-index: 1;
  }

  .url {
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 500;
    color: #F5F0E8;
    letter-spacing: 0.5px;
    position: relative;
    z-index: 1;
  }

  /* Linha decorativa verso */
  .card-back .bottom-line {
    position: absolute;
    bottom: 16px;
    left: 60px;
    right: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(197,165,114,0.15), transparent);
  }

  /* === PRINT STYLES === */
  @media print {
    body {
      background: white;
      gap: 20mm;
    }
    .label { display: none; }
    .card {
      width: 90mm;
      height: 50mm;
      box-shadow: none;
      border: 0.5px solid #ddd;
      page-break-inside: avoid;
    }
    .logo { font-size: 11mm; }
    .tagline { font-size: 3.2mm; }
  }

  /* === INSTRUÇÃO === */
  .instructions {
    max-width: 400px;
    color: #888;
    font-size: 12px;
    line-height: 1.6;
    text-align: center;
    border-top: 1px solid #444;
    padding-top: 20px;
  }
  .instructions strong { color: #C5A572; }
</style>
</head>
<body>

  <!-- FRENTE -->
  <p class="label">Frente</p>
  <div class="card card-front">
    <div class="sat-dot"></div>
    <div class="logo">

    <div class="tagline">Você não administra fazendas. Administra um império.</div>

      </div>
    </div>
    <div class="cta">Garanta sua vaga</div>
    <div class="url">agruai.com</div>
    <div class="bottom-line"></div>
  </div>

  <div class="instructions">
    <strong>Para impressão:</strong> Substitua o QR placeholder por um QR real
    gerado em <em>qr-code-generator.com</em> apontando para <strong>agruai.com</strong>.
    Formato: 90×50mm, papel couchê fosco 300g, laminação soft touch.
  </div>

</body>
</html>
