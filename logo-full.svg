<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 64" width="320" height="64">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@600;700&amp;display=swap');
    </style>
  </defs>

  <!-- Icon: satellite point in orbit + terrain contour -->
  <g transform="translate(4, 4)">
    <!-- Terrain contour lines -->
    <path d="M8 48 Q16 38, 24 40 Q32 42, 40 36 Q48 30, 56 32"
          fill="none" stroke="#C5A572" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M4 54 Q14 46, 24 48 Q34 50, 44 42 Q50 38, 56 39"
          fill="none" stroke="#C5A572" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>

    <!-- Satellite orbit arc -->
    <path d="M14 12 Q30 4, 46 14"
          fill="none" stroke="#C5A572" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Satellite point -->
    <circle cx="46" cy="14" r="3" fill="#C5A572"/>

    <!-- Signal pulse from satellite to terrain -->
    <line x1="44" y1="18" x2="32" y2="34"
          stroke="#C5A572" stroke-width="1" stroke-linecap="round" stroke-dasharray="3,3" opacity="0.6"/>

    <!-- Small signal arcs near satellite -->
    <path d="M38 20 Q42 17, 40 13"
          fill="none" stroke="#C5A572" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
  </g>

  <!-- Text: AgrUAI -->
  <text x="76" y="44" font-family="'Space Grotesk', system-ui, sans-serif" font-size="36" letter-spacing="-0.02em">
    <tspan fill="#F5F0E8" font-weight="600">Agr</tspan><tspan fill="#C5A572" font-weight="700">UAI</tspan>
  </text>
</svg>
