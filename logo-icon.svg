<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Terrain contour lines -->
  <path d="M8 48 Q16 38, 24 40 Q32 42, 40 36 Q48 30, 56 32"
        fill="none" stroke="#C5A572" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M4 54 Q14 46, 24 48 Q34 50, 44 42 Q50 38, 56 39"
        fill="none" stroke="#C5A572" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>

  <!-- Satellite orbit arc -->
  <path d="M14 14 Q30 4, 48 16"
        fill="none" stroke="#C5A572" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Satellite point -->
  <circle cx="48" cy="16" r="3.5" fill="#C5A572"/>

  <!-- Signal pulse from satellite to terrain -->
  <line x1="46" y1="20" x2="32" y2="34"
        stroke="#C5A572" stroke-width="1" stroke-linecap="round" stroke-dasharray="3,3" opacity="0.6"/>

  <!-- Small signal arcs near satellite -->
  <path d="M40 22 Q44 18, 42 14"
        fill="none" stroke="#C5A572" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
</svg>
